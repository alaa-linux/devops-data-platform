name: Docker Build Pipeline

on:
  workflow_call: {}
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Compute image version
        id: version
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image_tag=ci-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ingestion image
        run: |
          docker build \
            -t ingestion-api:ci -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ingestion-api:${{ steps.version.outputs.image_tag }} \
            -f docker/ingestion/Dockerfile .

      - name: Build Spark image
        run: |
          docker build \
            -t spark-batch:ci -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/spark-batch:${{ steps.version.outputs.image_tag }} \
            -f docker/spark/Dockerfile .

      - name: Build Airflow image
        run: |
          docker build \
            -t airflow-custom:ci -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/airflow-custom:${{ steps.version.outputs.image_tag }} \
            -f docker/airflow/Dockerfile .

      - name: Build ML image
        run: |
          docker build \
            -t ml-runtime:ci -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ml-runtime:${{ steps.version.outputs.image_tag }} \
            -f docker/ml/Dockerfile .

      - name: Build Spark exporter image
        run: |
          docker build \
            -t spark-exporter:ci -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/spark-exporter:${{ steps.version.outputs.image_tag }} \
            -f monitoring/spark-exporter/Dockerfile monitoring/spark-exporter

      - name: Push Docker images to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ingestion-api:${{ steps.version.outputs.image_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/spark-batch:${{ steps.version.outputs.image_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/airflow-custom:${{ steps.version.outputs.image_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ml-runtime:${{ steps.version.outputs.image_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/spark-exporter:${{ steps.version.outputs.image_tag }}
